[phases.setup]
nixPkgs = ["nodejs_20", "ffmpeg", "chromium", "nss", "nspr", "atk", "at-spi2-atk", "cups", "dbus", "libdrm", "mesa", "libGL", "libgles", "gtk3", "pango", "glib", "alsa-lib", "libxkbcommon", "xorg.libX11", "xorg.libXext", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXfixes", "xorg.libXrandr", "xorg.libxshmfence", "xorg.libXtst", "xorg.libXi", "xdg-utils"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["echo 'No build step needed'"]

[start]
cmd = "node studio-server.mjs"

[variables]
NODE_ENV = "production"
FFMPEG_PATH = "ffmpeg"
PUPPETEER_EXECUTABLE_PATH = "chromium"
CHROME_PATH = "chromium"
HOST = "0.0.0.0"
PORT = "4000"
